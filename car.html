<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Elite Automotive Showcase</title>
</head>
<body class="bg-zinc-950 text-white font-sans">

    <nav class="flex justify-between items-center p-6 border-b border-zinc-800">
        <div class="text-2xl font-bold tracking-tighter uppercase">Elite<span class="text-blue-500">Auto</span></div>
        <ul class="hidden md:flex space-x-8 text-sm uppercase tracking-widest text-zinc-400">
            <li class="hover:text-white cursor-pointer">Showcase</li>
            <li class="hover:text-white cursor-pointer">Spec Sheets</li>
            <li class="hover:text-white cursor-pointer">Contact</li>
        </ul>
    </nav>

    <header class="relative h-[80vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-t from-zinc-950 to-transparent z-10"></div>
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1920&q=80" 
             alt="Featured Vehicle" class="absolute inset-0 w-full h-full object-cover">
        
        <div class="relative z-20 text-center px-4">
            <h1 class="text-5xl md:text-8xl font-black uppercase italic leading-none">The Masterpiece</h1>
            <p class="mt-4 text-zinc-400 tracking-[0.2em] uppercase text-sm">Precision Engineering meets Digital Art</p>
            <button class="mt-8 px-8 py-3 bg-blue-600 hover:bg-blue-500 transition-all font-bold uppercase text-xs tracking-widest">
                Explore Specs
            </button>
        </div>
    </header>

    <section class="max-w-7xl mx-auto py-20 px-6">
        <h2 class="text-3xl font-light mb-12 tracking-tight">Current <span class="font-bold">Collection</span></h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="group cursor-pointer">
                <div class="overflow-hidden bg-zinc-900 aspect-video mb-4 border border-zinc-800 group-hover:border-blue-500 transition-all">
                    <img src="https://images.unsplash.com/photo-1558981285-6f0c94958bb6?auto=format&fit=crop&w=800&q=80" alt="Motorcycle" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all scale-100 group-hover:scale-105">
                </div>
                <h3 class="text-lg font-bold">The Heritage Bullet</h3>
                <p class="text-zinc-500 text-sm">Scale 1:7 Digital Render</p>
            </div>

            <div class="group cursor-pointer">
                <div class="overflow-hidden bg-zinc-900 aspect-video mb-4 border border-zinc-800 group-hover:border-blue-500 transition-all">
                    <img src="https://images.unsplash.com/photo-1594142666138-038753267d34?auto=format&fit=crop&w=800&q=80" alt="Tractor" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all scale-100 group-hover:scale-105">
                </div>
                <h3 class="text-lg font-bold">Heavy-Duty Series</h3>
                <p class="text-zinc-500 text-sm">Industrial Performance Modeling</p>
            </div>

            <div class="group cursor-pointer">
                <div class="overflow-hidden bg-zinc-900 aspect-video mb-4 border border-zinc-800 group-hover:border-blue-500 transition-all">
                    <img src="https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?auto=format&fit=crop&w=800&q=80" alt="Luxury Car" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all scale-100 group-hover:scale-105">
                </div>
                <h3 class="text-lg font-bold">Stealth Executive</h3>
                <p class="text-zinc-500 text-sm">Custom Interior Design</p>
            </div>
        </div>
    </section>

</body>
</html>
