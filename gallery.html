<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA | Scorpio-N Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
    
    <style>
        :root { --blue-glow: rgba(0, 210, 255, 0.1); --gold: #d4af37; }
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        .gold-accent { color: var(--gold); }
        .blue-accent { color: #00d2ff; }
        .cinema-glow { box-shadow: 0 0 60px var(--blue-glow); }
        .video-overlay { background: linear-gradient(to top, #050505 5%, rgba(0,0,0,0.2) 50%, transparent 100%); }
        .masonry-item { break-inside: avoid; margin-bottom: 2rem; }
        .masonry-container { column-count: 3; column-gap: 2rem; }
        @media (max-w: 768px) { .masonry-container { column-count: 1; } }
        @media (min-w: 769px) and (max-w: 1024px) { .masonry-container { column-count: 2; } }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-[#050505]">

    <nav class="flex justify-between items-center p-6 border-b border-zinc-900 sticky top-0 z-50 bg-black/90 backdrop-blur-md">
        <a href="index.html" class="text-2xl font-black tracking-tighter uppercase italic">
            <span class="blue-accent">S4</span><span class="gold-accent">SCORPIO</span>
        </a>
        <ul class="flex space-x-8 text-[10px] uppercase tracking-[0.4em] font-bold">
            <li><a href="index.html" class="text-zinc-500 hover:text-white transition-all">HOME</a></li>
        </ul>
        <a href="https://instagram.com/_s4scorpio" target="_blank" class="text-[10px] font-bold tracking-widest border border-zinc-800 px-6 py-2 hover:border-[#00d2ff] transition-all">FOLLOW IG</a>
    </nav>

    <header class="relative h-[40vh] flex items-center justify-center overflow-hidden border-b border-zinc-900">
        <div class="absolute inset-0 bg-black/40 video-overlay z-10"></div>
        <img src="images/car1.jpg" class="absolute inset-0 w-full h-full object-cover grayscale opacity-30">
        <div class="relative z-20 text-center px-4">
            <h1 class="text-6xl md:text-8xl font-black uppercase italic tracking-tighter blue-accent">CINEMA<span class="gold-accent">.</span></h1>
            <p class="text-zinc-500 tracking-[0.3em] uppercase text-xs">The Photographic Journey</p>
        </div>
    </header>

    <section class="max-w-7xl mx-auto py-20 px-6">
        <div class="masonry-container">
            
            <a href="images/car1.jpg" data-lightbox="scorpio" class="masonry-item group relative overflow-hidden block rounded-2xl border border-zinc-800 hover:border-[#00d2ff] transition-all cinema-glow">
                <img src="images/car1.jpg" class="w-full h-full object-cover transition-all duration-700 group-hover:scale-110">
            </a>

            <div class="masonry-item group relative overflow-hidden rounded-2xl border border-zinc-800 hover:border-gold transition-all">
                <video loop muted playsinline class="w-full h-full object-cover opacity-60 hover:opacity-100 transition-all duration-700" onmouseover="this.play()" onmouseout="this.pause(); this.currentTime=0;">
                    <source src="videos/roller-clip.mp4" type="video/mp4">
                </video>
            </div>

            <a href="images/car2.jpg" data-lightbox="scorpio" class="masonry-item group relative overflow-hidden block rounded-2xl border border-zinc-800 hover:border-[#00d2ff] transition-all">
                <img src="images/car2.jpg" class="w-full h-full object-cover transition-all duration-700 group-hover:scale-110">
            </a>

            <a href="images/car3.jpg" data-lightbox="scorpio" class="masonry-item group relative overflow-hidden block rounded-2xl border border-zinc-800 hover:border-[#00d2ff] transition-all">
                <img src="images/car3.jpg" class="w-full h-full object-cover transition-all duration-700 group-hover:scale-110">
            </a>

            <a href="images/car4.jpg" data-lightbox="scorpio" class="masonry-item group relative overflow-hidden block rounded-2xl border border-zinc-800 hover:border-[#00d2ff] transition-all">
                <img src="images/car4.jpg" class="w-full h-full object-cover transition-all duration-700 group-hover:scale-110">
            </a>

        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

</body>
</html>
